<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Baux - Nono Rent</title>
    <script src="/static/dist/index.js"></script>
</head>
<body>
    <nono-navigation-menu></nono-navigation-menu>
    <h1>Liste des Baux</h1>
    <nono-button text="Ajouter un Bail" id="add-lease-btn"></nono-button>
    <nono-table id="leases-table"></nono-table>
    <div id="lease-form-container" style="display: none;">
      <h2 id="form-title">Créer un Bail</h2>
      <div id="form-error" style="color: red; display: none;"></div>
      <nono-form id="lease-form">
        <nono-select label="Locataire" id="tenant-select"></nono-select>
        <nono-select label="Propriété" id="property-select"></nono-select>
        <nono-input label="Date de début" type="date" id="start-date"></nono-input>
        <nono-input label="Date de fin" type="date" id="end-date"></nono-input>
        <nono-input label="Durée (mois)" id="duration" readonly></nono-input>
        <nono-input label="Loyer mensuel" type="number" id="rent-amount"></nono-input>
        <nono-input label="Charges" type="number" id="charges"></nono-input>
        <nono-input label="Dépôt de garantie" type="number" id="deposit"></nono-input>
        <nono-select label="Type de bail" id="lease-type-select">
          <option value="furnished">Meublé</option>
          <option value="unfurnished">Vide</option>
        </nono-select>
        <nono-button text="Annuler" id="cancel-btn"></nono-button>
        <nono-button text="Créer" id="submit-btn"></nono-button>
      </nono-form>
    </div>
<script>
class LeasesManager {
  constructor() {
    this.leases = [];
    this.tenants = [];
    this.properties = [];
    this.editingLeaseId = null;
    this.init();
  }

  async init() {
    await this.loadData();
    this.renderTable();
    this.bindEvents();
  }

  async loadData() {
    try {
      const [leasesRes, tenantsRes, propertiesRes] = await Promise.all([
        fetch('/api/leases'),
        fetch('/api/tenants'),
        fetch('/api/properties')
      ]);
      this.leases = await leasesRes.json();
      this.tenants = await tenantsRes.json();
      this.properties = await propertiesRes.json();
    } catch (error) {
      console.error('Error loading data:', error);
    }
  }

  renderTable() {
    const headers = ['Locataire', 'Propriété', 'Date début', 'Date fin', 'Durée', 'Loyer', 'Actions'];
    const data = this.leases.map(lease => {
      const tenant = this.tenants.find(t => t.id === lease.tenant_id);
      const property = this.properties.find(p => p.id === lease.property_id);
      const tenantName = tenant ? `${tenant.first_name} ${tenant.last_name}` : 'Inconnu';
      const propertyAddr = property ? property.address : 'Inconnue';
      const duration = this.calculateDuration(lease.start_date, lease.end_date);
      return [
        tenantName,
        propertyAddr,
        lease.start_date,
        lease.end_date,
        `${duration} mois`,
        `${lease.rent_amount} €`,
        `<nono-button text="Modifier" data-action="edit" data-id="${lease.id}"></nono-button> <nono-button text="Supprimer" data-action="delete" data-id="${lease.id}"></nono-button>`
      ];
    });
    const table = document.getElementById('leases-table');
    table.setAttribute('headers', JSON.stringify(headers));
    table.setAttribute('data', JSON.stringify(data));
  }

  calculateDuration(start, end) {
    const startDate = new Date(start);
    const endDate = new Date(end);
    const diffTime = Math.abs(endDate - startDate);
    const diffMonths = Math.ceil(diffTime / (1000 * 60 * 60 * 24 * 30)); // approximate
    return diffMonths;
  }

  bindEvents() {
    document.getElementById('add-lease-btn').addEventListener('click', () => this.showForm());
    document.getElementById('cancel-btn').addEventListener('click', () => this.hideForm());
    document.getElementById('submit-btn').addEventListener('click', () => this.submitForm());
    document.getElementById('start-date').addEventListener('change', () => this.updateDuration());
    document.getElementById('end-date').addEventListener('change', () => this.updateDuration());
    // For edit/delete buttons in table, since they are added dynamically, use event delegation
    document.getElementById('leases-table').addEventListener('click', (e) => {
      const target = e.target.closest('nono-button');
      if (target) {
        const action = target.getAttribute('data-action');
        const id = target.getAttribute('data-id');
        if (action === 'edit') {
          this.editLease(id);
        } else if (action === 'delete') {
          this.deleteLease(id);
        }
      }
    });
  }

  showForm(lease = null) {
    this.editingLeaseId = lease ? lease.id : null;
    document.getElementById('form-title').textContent = lease ? 'Modifier le Bail' : 'Créer un Bail';
    document.getElementById('submit-btn').setAttribute('text', lease ? 'Modifier' : 'Créer');
    document.getElementById('lease-form-container').style.display = 'block';
    this.populateForm(lease);
  }

  hideForm() {
    document.getElementById('lease-form-container').style.display = 'none';
    this.editingLeaseId = null;
  }

  populateForm(lease) {
    // Populate selects
    const tenantSelect = document.getElementById('tenant-select');
    const tenantOptions = this.tenants.map(tenant => ({
      value: tenant.id.toString(),
      label: `${tenant.first_name} ${tenant.last_name}`
    }));
    tenantSelect.setAttribute('options', JSON.stringify(tenantOptions));
    if (lease) tenantSelect.setAttribute('value', lease.tenant_id.toString());

    const propertySelect = document.getElementById('property-select');
    const propertyOptions = this.properties.map(property => ({
      value: property.id.toString(),
      label: property.address
    }));
    propertySelect.setAttribute('options', JSON.stringify(propertyOptions));
    if (lease) propertySelect.setAttribute('value', lease.property_id.toString());

    // Populate inputs
    document.getElementById('start-date').setAttribute('value', lease ? lease.start_date : '');
    document.getElementById('end-date').setAttribute('value', lease ? lease.end_date : '');
    document.getElementById('rent-amount').setAttribute('value', lease ? lease.rent_amount.toString() : '');
    document.getElementById('charges').setAttribute('value', lease ? lease.charges.toString() : '');
    document.getElementById('deposit').setAttribute('value', lease ? lease.deposit.toString() : '');
    document.getElementById('lease-type-select').setAttribute('value', lease ? lease.lease_type : 'furnished');
    this.updateDuration();
  }

  updateDuration() {
    const start = document.getElementById('start-date').value;
    const end = document.getElementById('end-date').value;
    const duration = this.calculateDuration(start, end);
    document.getElementById('duration').value = duration;
  }

  async submitForm() {
    const formData = {
      tenant_id: parseInt(document.getElementById('tenant-select').value),
      property_id: parseInt(document.getElementById('property-select').value),
      start_date: document.getElementById('start-date').value,
      end_date: document.getElementById('end-date').value,
      rent_amount: parseFloat(document.getElementById('rent-amount').value),
      charges: parseFloat(document.getElementById('charges').value),
      deposit: parseFloat(document.getElementById('deposit').value),
      lease_type: document.getElementById('lease-type-select').value
    };
    // Validation
    if (new Date(formData.end_date) <= new Date(formData.start_date)) {
      document.getElementById('form-error').textContent = 'La date de fin doit être après la date de début';
      document.getElementById('form-error').style.display = 'block';
      return;
    }
    document.getElementById('form-error').style.display = 'none';
    try {
      const url = this.editingLeaseId ? `/api/leases/${this.editingLeaseId}` : '/api/leases';
      const method = this.editingLeaseId ? 'PUT' : 'POST';
      const res = await fetch(url, {
        method,
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(formData)
      });
      if (res.ok) {
        await this.loadData();
        this.renderTable();
        this.hideForm();
      } else {
        alert('Erreur lors de la sauvegarde');
      }
    } catch (error) {
      console.error('Error submitting form:', error);
    }
  }

  editLease(id) {
    const lease = this.leases.find(l => l.id === id);
    if (lease) {
      this.showForm(lease);
    }
  }

  async deleteLease(id) {
    if (confirm('Êtes-vous sûr de vouloir supprimer ce bail ?')) {
      try {
        const res = await fetch(`/api/leases/${id}`, { method: 'DELETE' });
        if (res.ok) {
          await this.loadData();
          this.renderTable();
        } else {
          alert('Erreur lors de la suppression');
        }
      } catch (error) {
        console.error('Error deleting lease:', error);
      }
    }
  }
}

document.addEventListener('DOMContentLoaded', () => {
  new LeasesManager();
});
</script>
</html>
